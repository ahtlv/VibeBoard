version: '3.9'

services:
  redis:
    image: redis:7-alpine
    container_name: vibeboard-redis
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: vibeboard-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379/0
      APP_ENV: development
      DEBUG: "true"
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      CORS_ORIGINS: '["http://localhost:3000","http://localhost:5173","https://vibeboard.orb.local"]'
      FRONTEND_URL: http://localhost:3000
    depends_on:
      redis:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000/api/v1
        VITE_SUPABASE_URL: ${SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF4anpha21lbG1vcW16dXh2d3NhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5ODI3OTMsImV4cCI6MjA5MjU1ODc5M30.y8zl0PUmo4Ya77fswF_HWWHfGNzXN45oN67Fe6RUq9k}
    container_name: vibeboard
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes: {}
