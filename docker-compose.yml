version: '3.9'

services:
  redis:
    image: redis:7-alpine
    container_name: vibeboard-redis
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: vibeboard-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379/0
      APP_ENV: development
      DEBUG: "true"
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: '["http://localhost:3000","http://localhost:5173","https://vibeboard.orb.local"]'
      FRONTEND_URL: http://localhost:3000
      EMAIL_VERIFICATION_TOKEN_EXPIRE_HOURS: ${EMAIL_VERIFICATION_TOKEN_EXPIRE_HOURS:-24}
      EMAIL_FROM: "${EMAIL_FROM:-VibeBoard <no-reply@vibeboard.local>}"
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
    depends_on:
      redis:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000/api/v1
    container_name: vibeboard
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes: {}
